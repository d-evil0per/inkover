name: Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runsOn }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            runsOn: windows-latest
            buildCommand: npm run package:win:release
            artifactName: inkover-windows
            artifactPath: |
              release/*.exe
              release/*.zip
              release/*.blockmap
              release/latest*.yml
          - label: Linux
            runsOn: ubuntu-latest
            buildCommand: npm run package:linux
            artifactName: inkover-linux
            artifactPath: |
              release/*.AppImage
              release/*.deb
          - label: macOS
            runsOn: macos-latest
            buildCommand: npm run package:mac
            artifactName: inkover-macos
            artifactPath: |
              release/*.dmg
              release/*.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libopenjp2-tools

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Prepare electron-builder environment
        shell: bash
        env:
          INPUT_CSC_LINK: ${{ secrets.CSC_LINK }}
          INPUT_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          INPUT_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          INPUT_APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          INPUT_APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          INPUT_APPLE_ID: ${{ secrets.APPLE_ID }}
          INPUT_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          INPUT_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"

          append_env() {
            local name="$1"
            local value="$2"

            if [ -z "$value" ]; then
              return
            fi

            local marker="EOF_$(openssl rand -hex 8)"
            {
              echo "$name<<$marker"
              echo "$value"
              echo "$marker"
            } >> "$GITHUB_ENV"
          }

          append_env CSC_LINK "$INPUT_CSC_LINK"
          append_env CSC_KEY_PASSWORD "$INPUT_CSC_KEY_PASSWORD"
          append_env APPLE_API_KEY "$INPUT_APPLE_API_KEY"
          append_env APPLE_API_KEY_ID "$INPUT_APPLE_API_KEY_ID"
          append_env APPLE_API_ISSUER "$INPUT_APPLE_API_ISSUER"
          append_env APPLE_ID "$INPUT_APPLE_ID"
          append_env APPLE_APP_SPECIFIC_PASSWORD "$INPUT_APPLE_APP_SPECIFIC_PASSWORD"
          append_env APPLE_TEAM_ID "$INPUT_APPLE_TEAM_ID"

          if [ -n "$INPUT_CSC_LINK" ]; then
            echo "Using configured code-signing secrets."
          else
            echo "No code-signing certificate configured; building unsigned artifacts."
          fi

      - name: Build platform distributables
        run: ${{ matrix.buildCommand }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: ${{ matrix.artifactPath }}
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/**/*